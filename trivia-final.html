<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Trivia Slide</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 32px 0 0 0;
        color: #fff;
        height: 100vh;
        background: linear-gradient(135deg, #3a0ca3, #7209b7);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
    }

    #timer {
        font-size: 2.7em;
        margin-bottom: 0.3em;
        color: #ffd700;
        text-align: center;
    }

    .timer-bar {
        width: 100%;
        height: 10px;
        background: red;
        animation: countdown 20s linear forwards;
    }

    @keyframes countdown {
        from { width: 100%; }
        to { width: 0%; }
    }

    .question-block {
        background: rgba(0, 0, 0, 0.6);
        border: 3px solid #fff;
        padding: 2em 4em;
        border-radius: 20px;
        max-width: 90%;
        width: 1000px;
        text-align: center;
        position: relative;
    }

    .question-block::before {
        content: "?";
        position: absolute;
        font-size: 10em;
        color: rgba(255, 255, 255, 0.1);
        top: 50%;
        left: -60px;
        transform: translateY(-50%);
        pointer-events: none;
    }

    .category-title {
        font-size: 3em;
        margin-bottom: 1em;
        color: #ffd700;
    }

    .question {
        font-size: 2.5em;
        margin-bottom: 1em;
    }

    .options {
        font-size: 2em;
    }

    .option {
        display: block;
        margin: 0.8em 0;
        border: 2px solid #fff;
        padding: 0.4em 0.6em;
        border-radius: 10px;
        background-color: rgba(255, 255, 255, 0.1);
        cursor: default;
    }

    /* YOUR EXACT GREEN HIGHLIGHT */
    .correct {
        color: #00ff99;
        font-weight: bold;
        border-color: #00ff99;
        background-color: rgba(0, 255, 153, 0.2);
    }

    .reveal {
        margin-top: 1.5em;
        font-size: 2em;
        color: #00ff99;
        display: none;
    }
</style>
</head>

<body>

<div id="timer">20 seconds</div>
<div class="timer-bar"></div>
<div id="questions-wrapper"></div>

<script>
/* LOAD QUESTIONS FROM EXTERNAL JSON */
let questions = [];

fetch("questions.json")
    .then(response => response.json())
    .then(data => {
        questions = data;
        loadQuestion();
    });

/* SHUFFLE ARRAY */
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

/* LOAD A RANDOM QUESTION */
function loadQuestion() {
    document.querySelector(".timer-bar").style.animation = "none";
    void document.querySelector(".timer-bar").offsetWidth;
    document.querySelector(".timer-bar").style.animation = "countdown 20s linear forwards";

    const wrapper = document.getElementById("questions-wrapper");
    wrapper.innerHTML = "";

    const q = questions[Math.floor(Math.random() * questions.length)];

    const block = document.createElement("div");
    block.className = "question-block";

    const cat = document.createElement("div");
    cat.className = "category-title";
    cat.textContent = q.category;

    const question = document.createElement("div");
    question.className = "question";
    question.textContent = q.question;

    const opts = document.createElement("div");
    opts.className = "options";

    let optionIndexes = [0, 1, 2, 3];
    shuffle(optionIndexes);

    optionIndexes.forEach((i) => {
        const opt = document.createElement("div");
        opt.className = "option";
        opt.id = "opt-" + i;
        opt.textContent = q.options[i];
        opts.appendChild(opt);
    });

    const reveal = document.createElement("div");
    reveal.className = "reveal";
    reveal.textContent = "Answer: " + q.options[q.correctIndex];

    block.appendChild(cat);
    block.appendChild(question);
    block.appendChild(opts);
    block.appendChild(reveal);

    wrapper.appendChild(block);

    /* REVEAL ANSWER AFTER 20 SECONDS */
    setTimeout(() => {
        document.getElementById("opt-" + q.correctIndex).classList.add("correct");
        reveal.style.display = "block";
    }, 20000);

    /* LOAD NEXT QUESTION AFTER 25 SECONDS */
    setTimeout(loadQuestion, 25000);
}
</script>

</body>
</html>
