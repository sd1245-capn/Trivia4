<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rotating Trivia Slide</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 0 0 0;
      color: #fff;
      height: 100vh;
      background: linear-gradient(135deg, #3a0ca3, #7209b7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* BIGGER TIMER */
    #timer {
      font-size: 3.8em;
      margin-bottom: 0.4em;
      color: #ffd700;
      text-align: center;
      font-weight: bold;
    }

    .timer-bar-container {
      width: 100%;
      max-width: 1200px;
      margin-bottom: 1.2em;
    }

    .timer-bar {
      width: 100%;
      height: 14px;
      background: red;
      transform-origin: left center;
    }

    /* BIGGER QUESTION BLOCK */
    .question-block {
      background: rgba(0, 0, 0, 0.55);
      border: 4px solid #fff;
      padding: 3.5em 5.5em;
      border-radius: 24px;
      max-width: 95%;
      width: 1200px;
      text-align: center;
      position: relative;
    }

    .question-block::before {
      content: "?";
      position: absolute;
      font-size: 12em;
      color: rgba(255, 255, 255, 0.08);
      top: 50%;
      left: -70px;
      transform: translateY(-50%);
      pointer-events: none;
    }

    /* BIGGER CATEGORY */
    .category-title {
      font-size: 3.8em;
      margin-bottom: 0.6em;
      color: #ffd700;
      font-weight: bold;
    }

    /* BIGGER QUESTION */
    .question {
      font-size: 3.4em;
      margin-bottom: 1em;
      line-height: 1.2;
    }

    /* BIGGER OPTIONS */
    .options {
      font-size: 2.8em;
    }

    .option {
      display: block;
      margin: 0.9em 0;
      border: 3px solid #fff;
      padding: 0.6em 1em;
      border-radius: 14px;
      background-color: rgba(255, 255, 255, 0.12);
      cursor: default;
    }

    .correct {
      color: #00ff99;
      font-weight: bold;
      border-color: #00ff99;
      background-color: rgba(0, 255, 153, 0.25);
    }

    /* BIGGER REVEAL */
    .reveal {
      margin-top: 1.6em;
      font-size: 3em;
      color: #00ff99;
      display: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="timer">35 seconds</div>
  <div class="timer-bar-container">
    <div class="timer-bar" id="timer-bar"></div>
  </div>
  <div id="questions-wrapper"></div>

  <script>
    const QUESTIONS = [
      {
        category: "General Knowledge",
        question: "What is the capital of New Jersey?",
        correct: "Trenton",
        incorrect: ["Newark", "Jersey City", "Camden"]
      },
      {
        category: "Sports",
        question: "Which team plays at Citizens Bank Park?",
        correct: "Philadelphia Phillies",
        incorrect: ["New York Mets", "Boston Red Sox", "Atlanta Braves"]
      },
      {
        category: "History",
        question: "In which year did World War II end?",
        correct: "1945",
        incorrect: ["1939", "1942", "1950"]
      },
      {
        category: "Entertainment",
        question: "Who played Rocky Balboa?",
        correct: "Sylvester Stallone",
        incorrect: ["Arnold Schwarzenegger", "Bruce Willis", "Robert De Niro"]
      }
    ];

    let questionOrder = [];
    let currentIndex = 0;
    let countdownInterval = null;
    let countdownSeconds = 35;

    function shuffleArray(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function initQuestionOrder() {
      questionOrder = shuffleArray(QUESTIONS.map((_, idx) => idx));
      currentIndex = 0;
    }

    function getNextQuestion() {
      if (currentIndex >= questionOrder.length) initQuestionOrder();
      return QUESTIONS[questionOrder[currentIndex++]];
    }

    function renderQuestion(q) {
      const wrapper = document.getElementById("questions-wrapper");
      wrapper.innerHTML = "";

      const block = document.createElement("div");
      block.className = "question-block";

      const categoryEl = document.createElement("div");
      categoryEl.className = "category-title";
      categoryEl.textContent = q.category;

      const questionEl = document.createElement("div");
      questionEl.className = "question";
      questionEl.textContent = q.question;

      const optionsEl = document.createElement("div");
      optionsEl.className = "options";

      const allAnswers = shuffleArray([q.correct, ...q.incorrect]);

      allAnswers.forEach(answer => {
        const opt = document.createElement("span");
        opt.className = "option";
        opt.textContent = answer;
        if (answer === q.correct) opt.dataset.correct = "true";
        optionsEl.appendChild(opt);
      });

      const revealEl = document.createElement("div");
      revealEl.className = "reveal";
      revealEl.id = "reveal";
      revealEl.textContent = "Answer: " + q.correct;

      block.appendChild(categoryEl);
      block.appendChild(questionEl);
      block.appendChild(optionsEl);
      block.appendChild(revealEl);

      wrapper.appendChild(block);
    }

    function resetTimerBar() {
      const bar = document.getElementById("timer-bar");
      bar.style.transition = "none";
      bar.style.transform = "scaleX(1)";
      void bar.offsetWidth;
      bar.style.transition = "transform 35s linear";
      bar.style.transform = "scaleX(0)";
    }

    function startCountdown(onDone) {
      const timerEl = document.getElementById("timer");
      countdownSeconds = 35;
      timerEl.textContent = countdownSeconds + " seconds";

      resetTimerBar();

      if (countdownInterval) clearInterval(countdownInterval);

      countdownInterval = setInterval(() => {
        countdownSeconds--;
        if (countdownSeconds > 0) {
          timerEl.textContent = countdownSeconds + " seconds";
        } else {
          timerEl.textContent = "Time's up!";
          clearInterval(countdownInterval);
          onDone();
        }
      }, 1000);
    }

    function revealAnswer() {
      const revealEl = document.getElementById("reveal");
      revealEl.style.display = "block";

      document.querySelectorAll(".option").forEach(opt => {
        if (opt.dataset.correct === "true") opt.classList.add("correct");
      });
    }

    function runQuestionCycle() {
      const q = getNextQuestion();
      renderQuestion(q);

      startCountdown(() => {
        revealAnswer();
        setTimeout(runQuestionCycle, 10000); // NOW 10 SECONDS
      });
    }

    window.addEventListener("load", () => {
      initQuestionOrder();
      runQuestionCycle();
    });
  </script>
</body>
</html>
