<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Rotating Trivia Slide</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 40px 0 0 0;
    color: #fff;
    height: 100vh;
    background: linear-gradient(135deg, #3a0ca3, #7209b7);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  #timer {
    font-size: 3.8em;
    margin-bottom: 0.4em;
    color: #ffd700;
    text-align: center;
    font-weight: bold;
  }

  .timer-bar-container {
    width: 100%;
    max-width: 1200px;
    margin-bottom: 1.2em;
  }

  .timer-bar {
    width: 100%;
    height: 14px;
    background: red;
    transform-origin: left center;
  }

  .question-block {
    background: rgba(0, 0, 0, 0.55);
    border: 4px solid #fff;
    padding: 3.5em 5.5em;
    border-radius: 24px;
    max-width: 95%;
    width: 1200px;
    text-align: center;
    position: relative;
  }

  .question-block::before {
    content: "?";
    position: absolute;
    font-size: 12em;
    color: rgba(255, 255, 255, 0.08);
    top: 50%;
    left: -70px;
    transform: translateY(-50%);
    pointer-events: none;
  }

  .category-title {
    font-size: 3.8em;
    margin-bottom: 0.6em;
    color: #ffd700;
    font-weight: bold;
  }

  .question {
    font-size: 3.4em;
    margin-bottom: 1em;
    line-height: 1.2;
  }

  .options {
    font-size: 2.8em;
  }

  .option {
    display: block;
    margin: 0.9em 0;
    border: 3px solid #fff;
    padding: 0.6em 1em;
    border-radius: 14px;
    background-color: rgba(255, 255, 255, 0.12);
    cursor: default;
  }

  .correct {
    color: #00ff99;
    font-weight: bold;
    border-color: #00ff99;
    background-color: rgba(0, 255, 153, 0.25);
  }

  .reveal {
    margin-top: 1.6em;
    font-size: 3em;
    color: #00ff99;
    display: none;
    font-weight: bold;
  }
</style>
</head>

<body>

<div id="timer">35 seconds</div>

<div class="timer-bar-container">
  <div class="timer-bar" id="timer-bar"></div>
</div>

<div id="questions-wrapper"></div>

<script>
/* ============================
   YOUR QUESTIONS GO HERE
   ============================ */
const QUESTIONS = [
  { category: "Phillies", question: "What year were the Philadelphia Phillies founded?", options: ["1883", "1890", "1901", "1912"], correctIndex: 0 },
  { category: "Phillies", question: "Who is the Phillies’ all-time home run leader?", options: ["Ryan Howard", "Mike Schmidt", "Chase Utley", "Del Ennis"], correctIndex: 1 },
  { category: "Phillies", question: "Which Phillies pitcher threw a perfect game in 2010?", options: ["Roy Halladay", "Cole Hamels", "Cliff Lee", "Roy Oswalt"], correctIndex: 0 },
  { category: "Phillies", question: "Who was the MVP of the 2008 World Series?", options: ["Chase Utley", "Ryan Howard", "Cole Hamels", "Jimmy Rollins"], correctIndex: 2 },
  { category: "Phillies", question: "What is the name of the Phillies’ home stadium?", options: ["Veterans Stadium", "Citizens Bank Park", "Shibe Park", "Connie Mack Stadium"], correctIndex: 1 },
  { category: "Phillies", question: "Who managed the Phillies to the 2008 World Series title?", options: ["Charlie Manuel", "Larry Bowa", "Ryne Sandberg", "Joe Girardi"], correctIndex: 0 },
  { category: "Phillies", question: "Which Phillies player is known as 'The Big Piece'?", options: ["Chase Utley", "Ryan Howard", "Pat Burrell", "Jim Thome"], correctIndex: 1 },
  { category: "Phillies", question: "Who is the Phillies’ all-time hits leader?", options: ["Jimmy Rollins", "Mike Schmidt", "Richie Ashburn", "Chase Utley"], correctIndex: 0 },
  { category: "Phillies", question: "What year did the Phillies win their first World Series?", options: ["1976", "1980", "1983", "1993"], correctIndex: 1 },
  { category: "Phillies", question: "Which Phillies pitcher won the 1980 World Series MVP?", options: ["Steve Carlton", "Tug McGraw", "Larry Christenson", "Dick Ruthven"], correctIndex: 0 }
];

/* ============================
   SCRIPT LOGIC (UPDATED)
   ============================ */

let questionOrder = [];
let currentIndex = 0;
let countdownInterval = null;
let countdownSeconds = 35;

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initQuestionOrder() {
  questionOrder = shuffleArray(QUESTIONS.map((_, idx) => idx));
  currentIndex = 0;
}

function getNextQuestion() {
  if (currentIndex >= questionOrder.length) initQuestionOrder();
  return QUESTIONS[questionOrder[currentIndex++]];
}

function renderQuestion(q) {
  const wrapper = document.getElementById("questions-wrapper");
  wrapper.innerHTML = "";

  const block = document.createElement("div");
  block.className = "question-block";

  const categoryEl = document.createElement("div");
  categoryEl.className = "category-title";
  categoryEl.textContent = q.category;

  const questionEl = document.createElement("div");
  questionEl.className = "question";
  questionEl.textContent = q.question;

  const optionsEl = document.createElement("div");
  optionsEl.className = "options";

  const indexedOptions = q.options.map((opt, i) => ({
    text: opt,
    isCorrect: i === q.correctIndex
  }));

  const shuffled = shuffleArray(indexedOptions);

  shuffled.forEach(optObj => {
    const opt = document.createElement("span");
    opt.className = "option";
    opt.textContent = optObj.text;
    if (optObj.isCorrect) opt.dataset.correct = "true";
    optionsEl.appendChild(opt);
  });

  const revealEl = document.createElement("div");
  revealEl.className = "reveal";
  revealEl.id = "reveal";
  revealEl.textContent = "Answer: " + q.options[q.correctIndex];

  block.appendChild(categoryEl);
  block.appendChild(questionEl);
  block.appendChild(optionsEl);
  block.appendChild(revealEl);

  wrapper.appendChild(block);
}

function resetTimerBar() {
  const bar = document.getElementById("timer-bar");
  bar.style.transition = "none";
  bar.style.transform = "scaleX(1)";
  void bar.offsetWidth;
  bar.style.transition = "transform 35s linear";
  bar.style.transform = "scaleX(0)";
}

function startCountdown(onDone) {
  const timerEl = document.getElementById("timer");
  countdownSeconds = 35;
  timerEl.textContent = countdownSeconds + " seconds";

  resetTimerBar();

  if (countdownInterval) clearInterval(countdownInterval);

  countdownInterval = setInterval(() => {
    countdownSeconds--;
    if (countdownSeconds > 0) {
      timerEl.textContent = countdownSeconds + " seconds";
    } else {
      timerEl.textContent = "Time's up!";
      clearInterval(countdownInterval);
      onDone();
    }
  }, 1000);
}

function revealAnswer() {
  const revealEl = document.getElementById("reveal");
  revealEl.style.display = "block";

  document.querySelectorAll(".option").forEach(opt => {
    if (opt.dataset.correct === "true") opt.classList.add("correct");
  });
}

function runQuestionCycle() {
  const q = getNextQuestion();
  renderQuestion(q);

  setTimeout(() => {
    startCountdown(() => {
      revealAnswer();

      setTimeout(() => {
        setTimeout(runQuestionCycle, 10000);
      }, 50);

    });
  }, 100);
}

window.addEventListener("load", () => {
  initQuestionOrder();
  runQuestionCycle();
});
</script>

</body>
</html>
