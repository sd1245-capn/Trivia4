<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rotating Trivia Slide</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 0 0 0;
      color: #fff;
      height: 100vh;
      background: linear-gradient(135deg, #3a0ca3, #7209b7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    #timer {
      font-size: 3.8em;
      margin-bottom: 0.4em;
      color: #ffd700;
      text-align: center;
      font-weight: bold;
    }

    .timer-bar-container {
      width: 100%;
      max-width: 1200px;
      margin-bottom: 1.2em;
    }

    .timer-bar {
      width: 100%;
      height: 14px;
      background: red;
      transform-origin: left center;
    }

    .question-block {
      background: rgba(0, 0, 0, 0.55);
      border: 4px solid #fff;
      padding: 3.5em 5.5em;
      border-radius: 24px;
      max-width: 95%;
      width: 1200px;
      text-align: center;
      position: relative;
    }

    .question-block::before {
      content: "?";
      position: absolute;
      font-size: 12em;
      color: rgba(255, 255, 255, 0.08);
      top: 50%;
      left: -70px;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .category-title {
      font-size: 3.8em;
      margin-bottom: 0.6em;
      color: #ffd700;
      font-weight: bold;
    }

    .question {
      font-size: 3.4em;
      margin-bottom: 1em;
      line-height: 1.2;
    }

    .options {
      font-size: 2.8em;
    }

    .option {
      display: block;
      margin: 0.9em 0;
      border: 3px solid #fff;
      padding: 0.6em 1em;
      border-radius: 14px;
      background-color: rgba(255, 255, 255, 0.12);
      cursor: default;
    }

    .correct {
      color: #00ff99;
      font-weight: bold;
      border-color: #00ff99;
      background-color: rgba(0, 255, 153, 0.25);
    }

    .reveal {
      margin-top: 1.6em;
      font-size: 3em;
      color: #00ff99;
      display: none;
      font-weight: bold;
    }
  </style>
</head>
